pipeline_name: "orders_pipeline"

input:
  raw_filename: "olist_orders_dataset.csv"
  raw_sep: ","
  raw_encoding: "utf-8"

interim:
  enabled: true
  filename: "orders_interim.parquet"

processed:
  filename: "orders_base.parquet"

columns:
  keep:
    - "order_id"
    - "customer_id"
    - "order_status"
    - "order_purchase_timestamp"
    - "order_approved_at"
    - "order_delivered_carrier_date"
    - "order_delivered_customer_date"
    - "order_estimated_delivery_date"

  datetime:
    - "order_purchase_timestamp"
    - "order_approved_at"
    - "order_delivered_carrier_date"
    - "order_delivered_customer_date"
    - "order_estimated_delivery_date"

features:
  create_order_purchase_date: true
  create_order_year_month: true